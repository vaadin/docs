<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 296">
  <style>
    .label { font-family: ui-monospace, SFMono-Regular, monospace; font-size: 12px; font-weight: 600; fill: #333; }
    .container { fill: #f3f5f7; stroke: #d0d4da; stroke-width: 1; rx: 6; }
    .item { rx: 4; }
  </style>

  <!-- START -->
  <text class="label" x="10" y="38" dominant-baseline="middle">START</text>
  <rect class="container" x="130" y="10" width="360" height="48"/>
  <rect class="item" fill="#1565C0" x="130" y="18" width="70" height="32" rx="4"/>
  <rect class="item" fill="#1E88E5" x="208" y="18" width="50" height="32" rx="4"/>
  <rect class="item" fill="#42A5F5" x="266" y="18" width="60" height="32" rx="4"/>

  <!-- CENTER -->
  <text class="label" x="10" y="106" dominant-baseline="middle">CENTER</text>
  <rect class="container" x="130" y="78" width="360" height="48"/>
  <rect class="item" fill="#1565C0" x="212" y="86" width="70" height="32" rx="4"/>
  <rect class="item" fill="#1E88E5" x="290" y="86" width="50" height="32" rx="4"/>
  <rect class="item" fill="#42A5F5" x="348" y="86" width="60" height="32" rx="4"/>

  <!-- END -->
  <text class="label" x="10" y="174" dominant-baseline="middle">END</text>
  <rect class="container" x="130" y="146" width="360" height="48"/>
  <rect class="item" fill="#1565C0" x="294" y="154" width="70" height="32" rx="4"/>
  <rect class="item" fill="#1E88E5" x="372" y="154" width="50" height="32" rx="4"/>
  <rect class="item" fill="#42A5F5" x="430" y="154" width="60" height="32" rx="4"/>

  <!-- BETWEEN -->
  <text class="label" x="10" y="242" dominant-baseline="middle">BETWEEN</text>
  <rect class="container" x="130" y="214" width="360" height="48"/>
  <rect class="item" fill="#1565C0" x="130" y="222" width="70" height="32" rx="4"/>
  <rect class="item" fill="#1E88E5" x="285" y="222" width="50" height="32" rx="4"/>
  <rect class="item" fill="#42A5F5" x="430" y="222" width="60" height="32" rx="4"/>
</svg>
