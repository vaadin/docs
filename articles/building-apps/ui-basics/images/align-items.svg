<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 228">
  <style>
    .label { font-family: ui-monospace, SFMono-Regular, monospace; font-size: 12px; font-weight: 600; fill: #333; }
    .container { fill: #f3f5f7; stroke: #d0d4da; stroke-width: 1; rx: 6; }
    .item { rx: 4; }
    @media (prefers-color-scheme: dark) {
      .label { fill: #ddd; }
      .container { fill: rgba(255, 255, 255, 0.08); stroke: rgba(255, 255, 255, 0.15); }
    }
  </style>

  <!-- START -->
  <text class="label" x="10" y="43" dominant-baseline="middle">START</text>
  <rect class="container" x="130" y="10" width="360" height="56"/>
  <rect class="item" fill="#1565C0" x="138" y="18" width="70" height="24" rx="4"/>
  <rect class="item" fill="#1E88E5" x="216" y="18" width="50" height="40" rx="4"/>
  <rect class="item" fill="#42A5F5" x="274" y="18" width="60" height="30" rx="4"/>

  <!-- CENTER -->
  <text class="label" x="10" y="119" dominant-baseline="middle">CENTER</text>
  <rect class="container" x="130" y="86" width="360" height="56"/>
  <rect class="item" fill="#1565C0" x="138" y="102" width="70" height="24" rx="4"/>
  <rect class="item" fill="#1E88E5" x="216" y="94" width="50" height="40" rx="4"/>
  <rect class="item" fill="#42A5F5" x="274" y="99" width="60" height="30" rx="4"/>

  <!-- END -->
  <text class="label" x="10" y="195" dominant-baseline="middle">END</text>
  <rect class="container" x="130" y="162" width="360" height="56"/>
  <rect class="item" fill="#1565C0" x="138" y="186" width="70" height="24" rx="4"/>
  <rect class="item" fill="#1E88E5" x="216" y="170" width="50" height="40" rx="4"/>
  <rect class="item" fill="#42A5F5" x="274" y="180" width="60" height="30" rx="4"/>
</svg>
