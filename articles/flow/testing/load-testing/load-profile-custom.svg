<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 250" font-family="Arial, sans-serif" font-size="13">
  <!-- Background -->
  <rect width="520" height="250" fill="#fff" rx="4"/>

  <!-- Axes -->
  <line x1="60" y1="30" x2="60" y2="200" stroke="#333" stroke-width="1.5"/>
  <line x1="60" y1="200" x2="490" y2="200" stroke="#333" stroke-width="1.5"/>

  <!-- Arrow heads -->
  <polygon points="60,28 56,36 64,36" fill="#333"/>
  <polygon points="492,200 484,196 484,204" fill="#333"/>

  <!-- Axis labels -->
  <text x="30" y="35" text-anchor="middle" font-size="13" fill="#333">VUs</text>
  <text x="490" y="220" text-anchor="middle" font-size="13" fill="#333">time</text>

  <!-- VU level labels -->
  <text x="52" y="164" text-anchor="end" font-size="11" fill="#666">20</text>
  <text x="52" y="114" text-anchor="end" font-size="11" fill="#666">50</text>
  <text x="52" y="64" text-anchor="end" font-size="11" fill="#666">80</text>

  <!-- Dashed guide lines for VU levels -->
  <line x1="60" y1="160" x2="490" y2="160" stroke="#eee" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="60" y1="110" x2="490" y2="110" stroke="#eee" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="60" y1="60" x2="490" y2="60" stroke="#eee" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Stages: 30s:20, 1m:50, 30s:50, 15s:80, 1m:80, 30s:0 -->
  <!-- Total: 4m15s = 255s. Proportional widths over ~420px range (60..480) -->
  <!-- 30s=49px, 60s=99px, 30s=49px, 15s=25px, 60s=99px, 30s=49px -->
  <polyline points="60,200 109,160 208,110 257,110 282,60 381,60 430,200"
            fill="none" stroke="#1676F3" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- Shaded area -->
  <polygon points="60,200 109,160 208,110 257,110 282,60 381,60 430,200"
           fill="#1676F3" fill-opacity="0.1"/>

  <!-- Vertical dashed lines at stage boundaries -->
  <line x1="109" y1="160" x2="109" y2="200" stroke="#999" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="208" y1="110" x2="208" y2="200" stroke="#999" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="257" y1="110" x2="257" y2="200" stroke="#999" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="282" y1="60" x2="282" y2="200" stroke="#999" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="381" y1="60" x2="381" y2="200" stroke="#999" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Stage duration labels -->
  <text x="85" y="230" text-anchor="middle" font-size="11" fill="#555">30s</text>
  <text x="159" y="230" text-anchor="middle" font-size="11" fill="#555">1m</text>
  <text x="233" y="230" text-anchor="middle" font-size="11" fill="#555">30s</text>
  <text x="270" y="230" text-anchor="middle" font-size="11" fill="#555">15s</text>
  <text x="332" y="230" text-anchor="middle" font-size="11" fill="#555">1m</text>
  <text x="406" y="230" text-anchor="middle" font-size="11" fill="#555">30s</text>
</svg>
