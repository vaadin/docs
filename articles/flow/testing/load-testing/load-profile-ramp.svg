<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 220" font-family="Arial, sans-serif" font-size="13">
  <!-- Background -->
  <rect width="520" height="220" fill="#fff" rx="4"/>

  <!-- Axes -->
  <line x1="60" y1="30" x2="60" y2="180" stroke="#333" stroke-width="1.5"/>
  <line x1="60" y1="180" x2="490" y2="180" stroke="#333" stroke-width="1.5"/>

  <!-- Arrow heads -->
  <polygon points="60,28 56,36 64,36" fill="#333"/>
  <polygon points="492,180 484,176 484,184" fill="#333"/>

  <!-- Axis labels -->
  <text x="30" y="35" text-anchor="middle" font-size="13" fill="#333">VUs</text>
  <text x="490" y="200" text-anchor="middle" font-size="13" fill="#333">time</text>

  <!-- Load profile shape -->
  <polyline points="60,180 160,60 380,60 480,180"
            fill="none" stroke="#1676F3" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- Shaded area -->
  <polygon points="60,180 160,60 380,60 480,180"
           fill="#1676F3" fill-opacity="0.1"/>

  <!-- Dashed guide lines -->
  <line x1="160" y1="60" x2="160" y2="180" stroke="#999" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="380" y1="60" x2="380" y2="180" stroke="#999" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="60" y1="60" x2="160" y2="60" stroke="#999" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Target VUs label -->
  <text x="50" y="64" text-anchor="end" font-size="11" fill="#666">target</text>

  <!-- Phase labels -->
  <text x="110" y="210" text-anchor="middle" font-size="12" fill="#555">rampUp</text>
  <text x="270" y="210" text-anchor="middle" font-size="12" fill="#555">sustain</text>
  <text x="430" y="210" text-anchor="middle" font-size="12" fill="#555">rampDown</text>
</svg>
