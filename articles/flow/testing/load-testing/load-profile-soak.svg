<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 220" font-family="Arial, sans-serif" font-size="13">
  <!-- Background -->
  <rect width="520" height="220" fill="#fff" rx="4"/>

  <!-- Axes -->
  <line x1="60" y1="30" x2="60" y2="180" stroke="#333" stroke-width="1.5"/>
  <line x1="60" y1="180" x2="490" y2="180" stroke="#333" stroke-width="1.5"/>

  <!-- Arrow heads -->
  <polygon points="60,28 56,36 64,36" fill="#333"/>
  <polygon points="492,180 484,176 484,184" fill="#333"/>

  <!-- Axis labels -->
  <text x="30" y="35" text-anchor="middle" font-size="13" fill="#333">VUs</text>
  <text x="490" y="200" text-anchor="middle" font-size="13" fill="#333">time</text>

  <!-- Target VUs guide -->
  <line x1="60" y1="60" x2="82" y2="60" stroke="#999" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="50" y="64" text-anchor="end" font-size="11" fill="#666">target</text>

  <!-- Load profile shape -->
  <!-- 5%: ramp up | 90%: sustain | 5%: ramp down -->
  <polyline points="60,180 82,60 460,60 482,180"
            fill="none" stroke="#1676F3" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- Shaded area -->
  <polygon points="60,180 82,60 460,60 482,180"
           fill="#1676F3" fill-opacity="0.1"/>

  <!-- Vertical dashed lines -->
  <line x1="82" y1="60" x2="82" y2="180" stroke="#999" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="460" y1="60" x2="460" y2="180" stroke="#999" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Sustain label -->
  <text x="271" y="45" text-anchor="middle" font-size="12" fill="#555">sustained load</text>

  <!-- Phase labels -->
  <text x="71" y="210" text-anchor="middle" font-size="12" fill="#555">5%</text>
  <text x="271" y="210" text-anchor="middle" font-size="12" fill="#555">90%</text>
  <text x="471" y="210" text-anchor="middle" font-size="12" fill="#555">5%</text>
</svg>
