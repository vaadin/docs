<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 250" font-family="Arial, sans-serif" font-size="13">
  <!-- Background -->
  <rect width="520" height="250" fill="#fff" rx="4"/>

  <!-- Axes -->
  <line x1="60" y1="30" x2="60" y2="200" stroke="#333" stroke-width="1.5"/>
  <line x1="60" y1="200" x2="490" y2="200" stroke="#333" stroke-width="1.5"/>

  <!-- Arrow heads -->
  <polygon points="60,28 56,36 64,36" fill="#333"/>
  <polygon points="492,200 484,196 484,204" fill="#333"/>

  <!-- Axis labels -->
  <text x="30" y="35" text-anchor="middle" font-size="13" fill="#333">VUs</text>
  <text x="490" y="220" text-anchor="middle" font-size="13" fill="#333">time</text>

  <!-- VU level labels -->
  <text x="52" y="164" text-anchor="end" font-size="11" fill="#666">50%</text>
  <text x="52" y="114" text-anchor="end" font-size="11" fill="#666">100%</text>
  <text x="52" y="64" text-anchor="end" font-size="11" fill="#666">150%</text>

  <!-- Dashed guide lines -->
  <line x1="60" y1="160" x2="490" y2="160" stroke="#ddd" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="60" y1="110" x2="490" y2="110" stroke="#ddd" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="60" y1="60" x2="490" y2="60" stroke="#ddd" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Load profile shape: 5 stages -->
  <!-- 10%: 0->50% | 10%: 50%->100% | 40%: hold 100% | 20%: spike 150% | 20%: ramp down 0 -->
  <polyline points="60,200 103,160 146,110 318,110 404,60 490,200"
            fill="none" stroke="#1676F3" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- Shaded area -->
  <polygon points="60,200 103,160 146,110 318,110 404,60 490,200"
           fill="#1676F3" fill-opacity="0.1"/>

  <!-- Vertical dashed lines at stage boundaries -->
  <line x1="103" y1="160" x2="103" y2="200" stroke="#999" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="146" y1="110" x2="146" y2="200" stroke="#999" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="318" y1="110" x2="318" y2="200" stroke="#999" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="404" y1="60" x2="404" y2="200" stroke="#999" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Phase labels -->
  <text x="82" y="230" text-anchor="middle" font-size="11" fill="#555">10%</text>
  <text x="125" y="230" text-anchor="middle" font-size="11" fill="#555">10%</text>
  <text x="232" y="230" text-anchor="middle" font-size="11" fill="#555">40%</text>
  <text x="361" y="230" text-anchor="middle" font-size="11" fill="#555">20%</text>
  <text x="447" y="230" text-anchor="middle" font-size="11" fill="#555">20%</text>

  <!-- Spike label -->
  <text x="404" y="50" text-anchor="middle" font-size="11" font-weight="bold" fill="#E8600A">spike</text>
</svg>
