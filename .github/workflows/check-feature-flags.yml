name: Check Feature Flags

on:
  schedule:
    - cron: '0 8 1 * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check feature flags
        run: node scripts/check-feature-flags.js --slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
